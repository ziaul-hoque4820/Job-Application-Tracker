<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="./assets/search.png" type="image/x-icon">

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }

        body {
            background-color: #f0f4f8;
        }

        .tracker-card {
            background: #fff;
            border: 1.5px dashed #93c5d6;
            border-radius: 12px;
        }

        .stat-divider {
            border-right: 1.5px dashed #c7dfe8;
        }

        .tab-active-custom {
            background: #e8f4f8;
            color: #0e4f6e;
            font-weight: 600;
            border-radius: 8px;
        }

        .tab-btn {
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .tab-btn:hover {
            background: #e8f4f8;
            color: #0e4f6e;
        }
    </style>

</head>

<body class="min-h-screen p-4 sm:p-8">

    <div class="max-w-4xl mx-auto space-y-5">
        <!-- Header Section Card -->
        <header class="tracker-card p-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-[#0a3d5c] mb-6">Job Application Tracker</h1>

            <div class="grid grid-cols-3 divide-x divide-dashed divide-[#c7dfe8]">

                <!-- Total -->
                <div class="pr-4 sm:pr-8">
                    <p class="text-gray-500 text-sm sm:text-base font-medium mb-1">Total</p>
                    <p id="js-total-job" class="text-2xl sm:text-4xl font-bold text-[#1a6fa0]">0</p>
                </div>

                <!-- Interview -->
                <div class="px-4 sm:px-8">
                    <p class="text-gray-500 text-sm sm:text-base font-medium mb-1">Interview</p>
                    <p id="js-interview-job" class="text-2xl sm:text-4xl font-bold text-[#22c55e]">0</p>
                </div>

                <!-- Rejected -->
                <div class="pl-4 sm:pl-8">
                    <p class="text-gray-500 text-sm sm:text-base font-medium mb-1">Rejected</p>
                    <p id="js-rejected-job" class="text-2xl sm:text-4xl font-bold text-[#ef4444]">0</p>
                </div>

            </div>
        </header>

        <!-- Available Jobs Card -->
        <div class="tracker-card p-6">

            <!-- Card Header -->
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-xl sm:text-2xl font-bold text-[#0a3d5c]">Available Jobs</h2>
                <span id="js-available-jobs" class="text-gray-400 text-sm sm:text-base font-medium">1 jobs</span>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-5 border-b border-dashed border-[#c7dfe8] pb-4">
                <button id="all-job" class="tab-btn tab-active-custom">All</button>
                <button id="interview-job" class="tab-btn">Interview</button>
                <button id="rejected-job" class="tab-btn">Rejected</button>
            </div>

            <!-- Job Card -->
            <div
                class="relative border border-gray-200 rounded-xl p-5 sm:p-6 bg-white hover:shadow-md transition-shadow duration-200">

                <!-- Delete Icon -->
                <button id="js-delete-job" class="absolute top-4 right-4 text-gray-300 hover:text-red-400 transition-colors duration-150">
                    <i class="fa-regular fa-trash-can text-base"></i>
                </button>

                <!-- Company & Role -->
                <div class="mb-2 pr-8">
                    <h3 class="text-base sm:text-lg font-bold text-gray-800">Mobile First Corp</h3>
                    <p class="text-gray-500 text-sm sm:text-base">React Native Developer</p>
                </div>

                <!-- Meta info -->
                <p class="text-gray-400 text-sm mb-4 flex flex-wrap items-center gap-1">
                    <span>Remote</span>
                    <span class="text-gray-300">•</span>
                    <span>Full-time</span>
                    <span class="text-gray-300">•</span>
                    <span>$130,000 – $175,000</span>
                </p>

                <!-- Status Badge -->
                <div id="status-badge" class="mb-4">
                    <span
                        class="inline-block border border-gray-300 text-gray-500 bg-gray-200 text-xs font-semibold tracking-widest px-3 py-1.5 rounded-md uppercase">
                        Not Applied
                    </span>
                </div>

                <!-- Description -->
                <p class="text-gray-500 text-sm sm:text-base mb-5 leading-relaxed">
                    Build cross-platform mobile applications using React Native. Work on products used by millions of
                    users worldwide.
                </p>

                <!-- Action Buttons -->
                <div class="flex flex-wrap gap-3">
                    <button id="js-interview-btn"
                        class="border border-[#22c55e] text-[#22c55e] text-xs font-bold tracking-widest px-4 py-2 rounded-md uppercase hover:bg-green-50 transition-colors duration-150">
                        Interview
                    </button>
                    <button id="js-rejected-btn"
                        class="border border-[#ef4444] text-[#ef4444] text-xs font-bold tracking-widest px-4 py-2 rounded-md uppercase hover:bg-red-50 transition-colors duration-150">
                        Rejected
                    </button>
                </div>

            </div>

        </div>
    </div>

    <script src="./script/index.js"></script>
</body>

</html>
